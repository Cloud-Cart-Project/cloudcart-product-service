spring:
  application:
    name: vehicle-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vehicle_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      continue-on-error: false
      schema-locations: classpath:db/postgresql-safeguards.sql
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000
      timeout: 2000
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes in milliseconds
      cache-null-values: false

jwt:
  secret: ${JWT_SECRET:dfsfjsdfkjsdfksdfksdfksdfsdfsdfksdfksdfksdfsdfsfdsdf}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.fleetops: INFO
    com.fleetops.vehicle.cache: DEBUG
    com.fleetops.vehicle.service: DEBUG

